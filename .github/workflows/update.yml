name: Update Valorant Stats

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Backup previous stats
        run: |
          if [ -f stats.json ]; then
            cp stats.json stats_prev.json
          fi

      - name: Fetch Valorant stats
        env:
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
        run: python fetch_valo.py

      - name: Commit & push
        run: |
          git config user.name "valostat-bot"
          git config user.email "bot@github.com"

          if git diff --quiet -- stats.json; then
            echo "No changes in stats.json; skipping commit."
            exit 0
          fi

          git add stats.json stats_prev.json
          git commit -m "Auto-update Valorant stats"
          git push
